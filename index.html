<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>منصة التحليل الذكي للتحصيل الدراسي</title>

<style>

:root{

--primary:#1e40af;

--secondary:#3b82f6;

--bg:#f8fafc;

--card:#ffffff;

--text:#0f172a;

--muted:#64748b;

--success:#16a34a;

--danger:#dc2626;

--warning:#f59e0b;

}

*{box-sizing:border-box;margin:0;padding:0}

body{

font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,sans-serif;

background:linear-gradient(135deg,#dbeafe,#eff6ff,#ffffff);

color:var(--text);

padding:20px;

}

.wrap{max-width:1200px;margin:auto}

header{

background:linear-gradient(135deg,var(--primary),var(--secondary));

color:#fff;

padding:28px;

border-radius:22px;

box-shadow:0 15px 35px rgba(0,0,0,.12);

margin-bottom:20px;

}

header h1{font-size:30px;margin-bottom:8px}

header p{opacity:.95}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:16px;

margin-bottom:20px;

}

.card{

background:var(--card);

border-radius:20px;

padding:18px;

box-shadow:0 10px 25px rgba(0,0,0,.07);

}

.metric{

font-size:34px;

font-weight:800;

margin-top:10px;

}

.good{color:var(--success)}

.bad{color:var(--danger)}

.warn{color:var(--warning)}

input,button,select{

width:100%;

padding:12px;

border:1px solid #cbd5e1;

border-radius:12px;

font-size:16px;

margin-top:10px;

}

button{

background:var(--primary);

color:#fff;

border:none;

cursor:pointer;

font-weight:700;

}

button:hover{opacity:.92}

table{

width:100%;

border-collapse:collapse;

margin-top:14px;

overflow:hidden;

}

th,td{

padding:10px;

border-bottom:1px solid #e5e7eb;

text-align:center;

font-size:14px;

}

th{background:#eff6ff}

.badge{

padding:6px 10px;

border-radius:999px;

font-size:12px;

font-weight:700;

display:inline-block;

}

.excellent{background:#dcfce7;color:#166534}

.verygood{background:#dbeafe;color:#1d4ed8}

.good2{background:#fef3c7;color:#92400e}

.weak{background:#fee2e2;color:#991b1b}

.footer{

margin-top:20px;

text-align:center;

color:var(--muted);

font-size:14px;

}

</style>

</head>

<body>

<div class="wrap">

<header>

<h1>منصة التحليل الذكي للتحصيل الدراسي</h1>

<p>تحليل فوري للدرجات + تصنيف الطالبات + خطط علاجية</p>

</header>

<div class="grid">

<div class="card">

<label>إدخال الدرجات (افصلي بفاصلة)</label>

<input id="scores" placeholder="95,88,76,64,55,100">

<button onclick="analyze()">ابدأ التحليل</button>

</div>

<div class="card">

<div>المتوسط العام</div>

<div class="metric" id="avg">0</div>

</div>

<div class="card">

<div>أعلى درجة</div>

<div class="metric good" id="max">0</div>

</div>

<div class="card">

<div>أقل درجة</div>

<div class="metric bad" id="min">0</div>

</div>

</div>

<div class="card">

<h3>نتائج التحليل</h3>

<table>

<thead>

<tr>

<th>#</th>

<th>الدرجة</th>

<th>التصنيف</th>

<th>الخطة المقترحة</th>

</tr>

</thead>

<tbody id="resultBody"></tbody>

</table>

</div>

<div class="footer">

إعداد منصة ذكية للتحليل الدراسي

</div>

</div>

<script>

function level(score){

if(score>=90) return ["متميز","excellent","إثراء وتحديات عليا"];

if(score>=80) return ["ممتاز","verygood","استمرار وتحفيز"];

if(score>=70) return ["جيد","good2","مراجعة أسبوعية"];

return ["ضعيف","weak","خطة علاجية مكثفة"];

}

function analyze(){

let raw=document.getElementById("scores").value.trim();

if(!raw)return;

let arr=raw.split(",").map(x=>Number(x.trim())).filter(x=>!isNaN(x));

if(!arr.length)return;

let avg=(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1);

let max=Math.max(...arr);

let min=Math.min(...arr);

document.getElementById("avg").textContent=avg;

document.getElementById("max").textContent=max;

document.getElementById("min").textContent=min;

let html="";

arr.forEach((s,i)=>{

let r=level(s);

html+=`

<tr>

<td>${i+1}</td>

<td>${s}</td>

<td><span class="badge ${r[1]}">${r[0]}</span></td>

<td>${r[2]}</td>

</tr>`;

});

document.getElementById("resultBody").innerHTML=html;

}

</script>

</body>

</html>
