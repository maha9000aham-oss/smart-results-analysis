<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تحليل نتائج الطالبات</title>

<style>

body{

  font-family: system-ui;

  margin:0;

  background:#f5f7fb;

  color:#1f2937;

}

header{

  background:#4f46e5;

  color:#fff;

  padding:20px;

  text-align:center;

  font-size:20px;

  font-weight:600;

}

.container{

  max-width:900px;

  margin:20px auto;

  padding:15px;

}

.card{

  background:#fff;

  border-radius:16px;

  padding:20px;

  box-shadow:0 4px 20px rgba(0,0,0,0.05);

  margin-bottom:20px;

}

button{

  background:#4f46e5;

  color:#fff;

  border:none;

  padding:12px 18px;

  border-radius:10px;

  cursor:pointer;

  font-size:14px;

}

button.secondary{

  background:#e5e7eb;

  color:#111;

}

table{

  width:100%;

  border-collapse:collapse;

  margin-top:15px;

}

th,td{

  padding:10px;

  border-bottom:1px solid #eee;

  text-align:center;

}

input{

  width:100%;

  padding:8px;

  border-radius:8px;

  border:1px solid #ddd;

}

.result{

  display:flex;

  gap:10px;

  flex-wrap:wrap;

}

.box{

  flex:1;

  background:#eef2ff;

  padding:15px;

  border-radius:12px;

  text-align:center;

}

</style>

</head>

<body>

<header>

منصة تحليل نتائج الطالبات

</header>

<div class="container">

<div class="card">

<button onclick="addRow()">إضافة طالبة</button>

<button class="secondary" onclick="analyze()">تحليل النتائج</button>

<table id="table">

<thead>

<tr>

<th>اسم الطالبة</th>

<th>الفصل</th>

<th>تقويم (20)</th>

<th>مهام (40)</th>

<th>نهائي (40)</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

<div class="card">

<div class="result" id="result"></div>

</div>

</div>

<script>

function addRow(){

  const row=`

  <tr>

  <td><input></td>

  <td><input></td>

  <td><input type="number"></td>

  <td><input type="number"></td>

  <td><input type="number"></td>

  </tr>`;

  document.querySelector("#table tbody").insertAdjacentHTML("beforeend",row);

}

function analyze(){

  const rows=document.querySelectorAll("#table tbody tr");

  let totals=[];

  rows.forEach(r=>{

    const inputs=r.querySelectorAll("input");

    const total=

    (+inputs[2].value||0)+

    (+inputs[3].value||0)+

    (+inputs[4].value||0);

    totals.push(total);

  });

  if(!totals.length) return;

  const avg=(totals.reduce((a,b)=>a+b,0)/totals.length).toFixed(2);

  const max=Math.max(...totals);

  const min=Math.min(...totals);

  document.getElementById("result").innerHTML=`

  <div class="box">عدد الطالبات<br>${totals.length}</div>

  <div class="box">المتوسط<br>${avg}</div>

  <div class="box">أعلى درجة<br>${max}</div>

  <div class="box">أقل درجة<br>${min}</div>

  `;

}

</script>

</body>

</html>
